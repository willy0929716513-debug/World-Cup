name: Update WC2026 Results

on:
  workflow_dispatch:          # manual trigger from GitHub Actions tab
  schedule:
    - cron: "0 */2 * * *"    # every 2 hours during the tournament

permissions:
  contents: write

jobs:
  fetch:
    name: Fetch & commit latest results
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch results
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python scripts/fetch_results.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/results.json
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "⚽ auto: update WC2026 results ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
