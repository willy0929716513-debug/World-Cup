name: Auto-Update WC2026 Results

on:
  workflow_dispatch:        # manual trigger from GitHub Actions tab
  schedule:
    # Every 20 minutes — matches end ~95 min after kickoff
    - cron: "*/20 * * * *"

permissions:
  contents: write

jobs:
  fetch:
    name: Fetch & commit latest results
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch results from ESPN
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python scripts/fetch_results.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/results.json
          if git diff --staged --quiet; then
            echo "No new results — skipping commit."
          else
            git commit -m "⚽ auto: update match results ($(date -u '+%Y-%m-%d %H:%M UTC')) [skip ci]"
            git push origin main
          fi
