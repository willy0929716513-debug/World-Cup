name: Build — Generate Static Pages Data

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      n_sim:
        description: "Tournament Monte Carlo simulations (default 10000)"
        required: false
        default: "10000"
  schedule:
    # Daily 06:00 UTC (14:00 Taiwan) — full ELO recalc + prediction regen
    # as a safety net even if the 20-min auto-update missed something
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  build:
    name: Generate data & deploy pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update ELO from actual results
        run: python scripts/update_elo_from_results.py || echo "⚠ ELO update skipped (no results yet)"

      - name: Fetch live odds (skipped if no API key)
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: python scripts/fetch_odds.py

      - name: Generate static JSON data
        run: python scripts/generate_static_data.py

      - name: List generated files
        run: |
          echo "=== docs/data/ ==="
          find docs/data -name "*.json" | sort | head -30
          echo "Total JSON files: $(find docs/data -name '*.json' | wc -l)"

      - name: Commit generated data to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage generated data + ELO-updated teams.json + odds status
          git add docs/data/ data/teams.json data/market_odds.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: regenerate static prediction data [skip ci]"
            # Stash any remaining unstaged changes before pull (prevents rebase failure)
            git stash push --include-untracked -m "pre-rebase stash" 2>/dev/null || true
            git pull --rebase origin ${{ github.ref_name }}
            git stash pop 2>/dev/null || true
            git push origin ${{ github.ref_name }}
          fi
