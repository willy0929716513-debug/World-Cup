<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WC2026 · Football Prediction System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#05080f;--bg2:#0b1022;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--home:#00d4ff;--away:#ff6b6b;--gold:#ffd700;--green:#00e676;--text:rgba(255,255,255,0.92);--dim:rgba(255,255,255,0.45)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;animation:twinkle var(--d,3s) infinite alternate}
@keyframes twinkle{from{opacity:.1;transform:scale(.8)}to{opacity:.8;transform:scale(1.2)}}
nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(5,8,15,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 2rem;height:60px;display:flex;align-items:center;gap:1rem}
.nav-logo{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:900;background:linear-gradient(90deg,var(--home),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.nav-tag{font-size:.7rem;color:var(--dim);border:1px solid var(--border);padding:.2rem .5rem;border-radius:20px}
.nav-spacer{flex:1}
.nav-link{color:var(--dim);font-size:.85rem;text-decoration:none;transition:color .2s;padding:.25rem .6rem;border-radius:8px;border:1px solid transparent}
.nav-link:hover{color:var(--text);border-color:var(--border)}
.nav-link.gold{color:var(--gold);border-color:rgba(255,215,0,.3)}
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 2rem 4rem;z-index:1}
.hero-badge{font-size:.75rem;letter-spacing:4px;color:var(--gold);border:1px solid rgba(255,215,0,.3);padding:.4rem 1.2rem;border-radius:20px;background:rgba(255,215,0,.05);margin-bottom:1.5rem;text-transform:uppercase}
.hero-title{font-family:'Orbitron',sans-serif;font-size:clamp(2.2rem,6vw,4.5rem);font-weight:900;text-align:center;line-height:1.1;background:linear-gradient(135deg,#fff 30%,var(--home) 60%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.8rem}
.hero-sub{color:var(--dim);font-size:1.05rem;text-align:center;margin-bottom:3rem}
.selector-card{background:rgba(11,16,34,.7);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:2.5rem;width:100%;max-width:780px;box-shadow:0 0 60px rgba(0,212,255,.08),0 0 120px rgba(0,0,0,.5)}
.selector-title{font-size:.75rem;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:1.5rem;text-align:center}
.teams-row{display:grid;grid-template-columns:1fr auto 1fr;gap:1rem;align-items:center;margin-bottom:1.5rem}
.vs-badge{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:900;color:var(--gold);text-align:center;text-shadow:0 0 20px rgba(255,215,0,.5)}
.team-select-wrap label{display:block;font-size:.72rem;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:.5rem}
.team-select{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:.95rem;padding:.75rem 1rem;border-radius:12px;appearance:none;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.team-select:focus{outline:none;border-color:var(--home);box-shadow:0 0 0 3px rgba(0,212,255,.15)}
.away-wrap .team-select:focus{border-color:var(--away)}
.details-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem}
.detail-field label{display:block;font-size:.72rem;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:.5rem}
.detail-field input,.detail-field select{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:.88rem;padding:.65rem 1rem;border-radius:12px;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.detail-field input:focus,.detail-field select:focus{outline:none;border-color:var(--gold)}
.predict-btn{width:100%;padding:1.1rem;border:none;border-radius:14px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,#0070ff,#00d4ff);color:#fff;box-shadow:0 0 30px rgba(0,212,255,.35);transition:transform .2s,box-shadow .2s}
.predict-btn:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(0,212,255,.55)}
.predict-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.teams-section{max-width:900px;width:100%;margin-top:3rem}
.teams-section-title{font-size:.72rem;letter-spacing:3px;color:var(--dim);text-transform:uppercase;text-align:center;margin-bottom:1.2rem}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.6rem}
.team-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.6rem .8rem;cursor:pointer;transition:all .2s;text-align:center}
.team-chip:hover{border-color:var(--home);background:rgba(0,212,255,.07);box-shadow:0 0 16px rgba(0,212,255,.15)}
.chip-code{font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:700;color:var(--home);display:block}
.chip-name{font-size:.7rem;color:var(--dim);display:block;margin-top:.2rem}
.chip-rank{font-size:.65rem;color:var(--gold)}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.hero-badge{animation:fadeUp .6s ease both}.hero-title{animation:fadeUp .6s .1s ease both}.hero-sub{animation:fadeUp .6s .2s ease both}.selector-card{animation:fadeUp .7s .3s ease both}.teams-section{animation:fadeUp .7s .5s ease both}
.home-wrap .team-select{border-color:rgba(0,212,255,.3)}.away-wrap .team-select{border-color:rgba(255,107,107,.3)}
@media(max-width:600px){
  .teams-row{grid-template-columns:1fr;gap:.5rem}
  .vs-badge{display:none}
  .details-grid{grid-template-columns:1fr}
  nav{padding:0 1rem;gap:.5rem}
  .nav-tag{display:none}
  .nav-link{font-size:.78rem;padding:.2rem .45rem}
  .selector-card{padding:1.4rem 1rem;border-radius:16px}
  .hero{padding:70px 1rem 3rem}
  .hero-title{font-size:1.9rem}
  .teams-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.45rem}
  .team-chip{padding:.5rem .6rem}
  .chip-code{font-size:.82rem}
  .predict-btn{font-size:.88rem;padding:.95rem}
  .detail-field input[type=date]{font-size:.82rem}
  .detail-field select{font-size:.82rem}
}
/* ── 炫砲 Visual Enhancement ─────────────────────────────────────────────── */
.aurora-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.aurora-orb{position:absolute;border-radius:50%;filter:blur(90px);animation:auroraFloat ease-in-out infinite alternate}
@keyframes auroraFloat{from{transform:translate(0,0) scale(1)}to{transform:translate(var(--tx,60px),var(--ty,40px)) scale(1.06)}}
/* VS badge rotating rings */
.vs-badge{position:relative}
.vs-badge::before,.vs-badge::after{content:'';position:absolute;inset:-10px;border-radius:50%;pointer-events:none}
.vs-badge::before{border:1.5px solid rgba(255,215,0,.25);animation:vsRing 8s linear infinite}
.vs-badge::after{border:1.5px solid transparent;border-top-color:rgba(255,215,0,.8);animation:vsRing 4s linear infinite reverse;filter:drop-shadow(0 0 4px rgba(255,215,0,.5))}
@keyframes vsRing{to{transform:rotate(360deg)}}
/* Predict button shimmer sweep */
.predict-btn{position:relative;overflow:hidden}
.predict-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.2) 50%,transparent 65%);animation:btnShimmer 3.5s infinite}
@keyframes btnShimmer{0%{transform:translateX(-200%)}100%{transform:translateX(200%)}}
/* Hero badge glow pulse */
.hero-badge{animation:fadeUp .6s ease both,badgePulse 3s ease-in-out 1s infinite}
@keyframes badgePulse{0%,100%{border-color:rgba(255,215,0,.3);box-shadow:none}50%{border-color:rgba(255,215,0,.65);box-shadow:0 0 22px rgba(255,215,0,.18)}}
/* Hero title gradient sweep */
.hero-title{background:linear-gradient(135deg,#fff 15%,var(--home) 40%,var(--gold) 65%,#fff 90%);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fadeUp .6s .1s ease both,titleFlow 6s ease-in-out .1s infinite}
@keyframes titleFlow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
/* Selector card breathing glow */
.selector-card{animation:fadeUp .7s .3s ease both,cardGlow 5s ease-in-out .3s infinite}
@keyframes cardGlow{0%,100%{box-shadow:0 0 60px rgba(0,212,255,.08),0 0 120px rgba(0,0,0,.5)}50%{box-shadow:0 0 90px rgba(0,212,255,.22),0 0 50px rgba(255,215,0,.08),0 0 120px rgba(0,0,0,.5)}}
/* Team chip enhanced hover */
.team-chip{transition:all .25s}
.team-chip:hover{border-color:var(--home);background:rgba(0,212,255,.09);box-shadow:0 0 20px rgba(0,212,255,.22);transform:translateY(-2px) scale(1.02)}
/* ── V2: Scanline + Rainbow + Glitch ──────────────────────────────────────── */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.05) 0,rgba(0,0,0,.05) 1px,transparent 1px,transparent 4px)}
/* Aurora orbs sharper */
.aurora-orb{filter:blur(70px)}
/* Rainbow cycling selector-card border */
@keyframes rainbowBorder{
  0%{box-shadow:0 0 0 1px rgba(0,212,255,.55),0 0 50px rgba(0,212,255,.18),0 0 100px rgba(0,0,0,.5)}
  25%{box-shadow:0 0 0 1px rgba(147,51,234,.55),0 0 50px rgba(147,51,234,.18),0 0 100px rgba(0,0,0,.5)}
  50%{box-shadow:0 0 0 1px rgba(255,215,0,.55),0 0 50px rgba(255,215,0,.18),0 0 100px rgba(0,0,0,.5)}
  75%{box-shadow:0 0 0 1px rgba(255,107,107,.55),0 0 50px rgba(255,107,107,.18),0 0 100px rgba(0,0,0,.5)}
  100%{box-shadow:0 0 0 1px rgba(0,212,255,.55),0 0 50px rgba(0,212,255,.18),0 0 100px rgba(0,0,0,.5)}}
.selector-card{animation:fadeUp .7s .3s ease both,rainbowBorder 8s linear .3s infinite}
/* Hero title glitch */
@keyframes heroGlitch{
  0%,86%,100%{transform:none;filter:none}
  87%{transform:translate(-3px,1px) skewX(2deg);filter:saturate(3) hue-rotate(20deg)}
  88%{transform:translate(3px,-2px);filter:saturate(4) hue-rotate(-25deg)}
  89%{transform:translate(-1px,0) skewX(-1deg);filter:saturate(2) hue-rotate(10deg)}
  90%{transform:none;filter:none}}
.hero-title{animation:fadeUp .6s .1s ease both,titleFlow 6s ease-in-out .1s infinite,heroGlitch 12s steps(1) 3s infinite}
/* VS badge electric pulse */
@keyframes vsBadgePulse{
  0%,100%{text-shadow:0 0 20px rgba(255,215,0,.5),0 0 40px rgba(255,215,0,.2)}
  50%{text-shadow:0 0 30px rgba(255,215,0,.95),0 0 60px rgba(255,215,0,.45),0 0 100px rgba(255,215,0,.15)}}
.vs-badge{animation:vsBadgePulse 2s ease-in-out infinite}
/* Nav logo neon */
@keyframes navLogoPulse{0%,100%{filter:drop-shadow(0 0 5px rgba(0,212,255,.35))}50%{filter:drop-shadow(0 0 14px rgba(0,212,255,.75))}}
.nav-logo{animation:navLogoPulse 3s ease-in-out infinite}
/* Predict button stronger pulse on hover */
.predict-btn:hover{transform:translateY(-3px) scale(1.01);box-shadow:0 0 60px rgba(0,212,255,.65)}
/* Detail fields glow on focus */
.detail-field input:focus,.detail-field select:focus{box-shadow:0 0 0 2px rgba(255,215,0,.25)}
/* ── Stadium Atmosphere ──────────────────────────────────────────────────── */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(180deg,
    transparent 0,transparent 55px,
    rgba(0,140,50,.018) 55px,rgba(0,140,50,.018) 110px)}
.floodlights{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.flood{position:absolute;top:-60px;width:520px;height:110vh}
.flood-l{left:-80px;background:conic-gradient(from 28deg at 0% 0%,transparent 0deg,rgba(255,255,230,.05) 14deg,transparent 28deg);animation:floodPulse 10s ease-in-out infinite}
.flood-r{right:-80px;background:conic-gradient(from -28deg at 100% 0%,transparent 0deg,rgba(255,255,230,.05) 14deg,transparent 28deg);animation:floodPulse 10s ease-in-out 5s infinite}
@keyframes floodPulse{0%,100%{opacity:.6}50%{opacity:1}}
.pitch-circle{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:680px;height:680px;border-radius:50%;pointer-events:none;z-index:0;border:1px solid rgba(0,180,60,.055);animation:pcPulse 10s ease-in-out infinite}
.pitch-circle::before{content:'';position:absolute;inset:30%;border-radius:50%;border:1px solid rgba(0,180,60,.04)}
.pitch-circle::after{content:'';position:absolute;inset:-1px;border-radius:50%;border:1px solid rgba(0,180,60,.025)}
@keyframes pcPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.7}50%{transform:translate(-50%,-50%) scale(1.04);opacity:1}}
.live-badge{display:inline-flex;align-items:center;gap:.35rem;font-size:.58rem;font-family:'Orbitron',sans-serif;font-weight:900;color:#ff3333;letter-spacing:1.5px;padding:.2rem .55rem;border-radius:20px;border:1px solid rgba(255,50,50,.3);background:rgba(255,50,50,.07)}
.live-dot{width:6px;height:6px;border-radius:50%;background:#ff3333;flex-shrink:0;animation:liveDot 1s ease-in-out infinite}
@keyframes liveDot{0%,100%{opacity:1;box-shadow:0 0 6px #ff3333}50%{opacity:.25;box-shadow:none}}
/* index pitch center behind card */
.hero{isolation:isolate}
.pitch-mid-line{position:fixed;top:50%;left:0;right:0;height:1px;background:rgba(0,180,60,.035);pointer-events:none;z-index:0}
/* Trophy emblem animation */
@keyframes trophyBounce{0%,100%{transform:translateY(0) scale(1)}40%{transform:translateY(-6px) scale(1.08)}70%{transform:translateY(-2px) scale(1.03)}}
.hero-trophy{font-size:2.8rem;display:block;text-align:center;animation:trophyBounce 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(255,215,0,.5));margin-bottom:.5rem}
/* WC stamp */
.wc-stamp{position:fixed;bottom:3rem;right:2rem;z-index:2;pointer-events:none;opacity:.1;font-family:'Orbitron',sans-serif;font-size:.6rem;font-weight:900;color:white;border:2px solid white;border-radius:50%;width:80px;height:80px;display:flex;align-items:center;justify-content:center;text-align:center;letter-spacing:1px;line-height:1.3;transform:rotate(-15deg)}
/* Goalposts frame decoration */
.goalpost-frame{position:fixed;top:60px;left:0;right:0;height:3px;pointer-events:none;z-index:0;
  background:linear-gradient(90deg,transparent 3%,rgba(255,255,255,.06) 3%,rgba(255,255,255,.06) 6%,transparent 6%,transparent 94%,rgba(255,255,255,.06) 94%,rgba(255,255,255,.06) 97%,transparent 97%)}
/* Hero badge more dramatic */
.hero-badge{font-size:.8rem;letter-spacing:5px;padding:.5rem 1.5rem}
</style>
</head>
<body>
<div class="floodlights"><div class="flood flood-l"></div><div class="flood flood-r"></div></div>
<div class="pitch-circle"></div>
<div class="pitch-mid-line"></div>
<div class="wc-stamp">FIFA<br>WC<br>2026</div>
<div class="goalpost-frame"></div>
<div class="aurora-bg">
  <div class="aurora-orb" style="width:520px;height:520px;left:15%;top:8%;background:rgba(0,212,255,.10);--tx:-70px;--ty:80px;animation-duration:18s"></div>
  <div class="aurora-orb" style="width:580px;height:580px;left:70%;top:55%;background:rgba(255,107,107,.08);--tx:80px;--ty:-50px;animation-duration:22s"></div>
  <div class="aurora-orb" style="width:380px;height:380px;left:8%;top:65%;background:rgba(255,215,0,.07);--tx:-60px;--ty:70px;animation-duration:16s"></div>
  <div class="aurora-orb" style="width:440px;height:440px;left:88%;top:20%;background:rgba(0,230,118,.06);--tx:55px;--ty:65px;animation-duration:20s"></div>
  <div class="aurora-orb" style="width:500px;height:500px;left:50%;top:88%;background:rgba(147,51,234,.08);--tx:-45px;--ty:-75px;animation-duration:24s"></div>
</div>
<div id="stars"></div>
<nav>
  <span class="nav-logo">WC2026</span>
  <span class="nav-tag">PREDICTION SYSTEM</span>
  <span class="nav-spacer"></span>
  <a href="index.html" class="nav-link">首頁</a>
  <a href="groups.html" class="nav-link">小組賽</a>
  <a href="bracket.html" class="nav-link gold">淘汰賽</a>
</nav>

<section class="hero">
  <div class="hero-trophy">🏆</div>
  <div class="hero-badge">⚽ FIFA WORLD CUP 2026 · USA · CANADA · MEXICO</div>
  <h1 class="hero-title">Football<br>Prediction System</h1>
  <p class="hero-sub">7 統計模型 · 14 分析維度 · 100,000 次 Monte Carlo 模擬</p>

  <form class="selector-card" id="predict-form">
    <p class="selector-title">選擇對戰球隊</p>
    <div class="teams-row">
      <div class="team-select-wrap home-wrap">
        <label>主隊 / Home Team</label>
        <select name="home" id="home-sel" class="team-select" required></select>
      </div>
      <div class="vs-badge">VS</div>

        <label>客隊 / Away Team</label>
        <select name="away" id="away-sel" class="team-select" required></select>
      </div>
    </div>
    <div class="details-grid">
      <div class="detail-field">
        <label>比賽日期</label>
        <input type="date" name="date" id="inp-date" value="2026-06-14">
      </div>
      <div class="detail-field">
        <label>賽制階段</label>
        <select name="stage" id="inp-stage">
          <option value="Group Stage">小組賽</option>

          <option value="Round of 16">16 強</option>

          <optgroup label="🇲🇽 墨西哥 (3 場館)">
            <option value="Estadio Azteca, Mexico City">Estadio Azteca — 墨西哥城</option>

  </form>

  <div class="teams-section">
    <p class="teams-section-title">點擊快速選擇球隊</p>
    <div class="teams-grid" id="teams-grid"></div>
  </div>
</section>

<script>
const starsEl = document.getElementById('stars');
for(let i=0;i<120;i++){
  const s=document.createElement('div'); s.className='star';
  const sz=Math.random()*2.5+0.5;
  const COLS=['255,255,255','255,255,255','255,255,255','0,212,255','255,215,0','255,107,107','0,230,118','147,51,234'];
  const c=COLS[Math.floor(Math.random()*COLS.length)];
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:rgba(${c},${Math.random()*.7+.2});--d:${Math.random()*4+2}s;animation-delay:${Math.random()*4}s`;
  starsEl.appendChild(s);
}

let clickCount = 0;
function quickSelect(code){
  const sel = clickCount%2===0 ? document.getElementById('home-sel') : document.getElementById('away-sel');
  sel.value = code;
  const c = clickCount%2===0 ? 'var(--home)' : 'var(--away)';
  const glow = clickCount%2===0 ? 'rgba(0,212,255,.2)' : 'rgba(255,107,107,.2)';
  sel.style.borderColor=c; sel.style.boxShadow=`0 0 0 3px ${glow}`;
  setTimeout(()=>{ sel.style.boxShadow=''; },600);
  clickCount++;
}

// Load teams
fetch('data/teams.json')
  .then(r=>r.json())
  .then(({teams})=>{
    const homeSel = document.getElementById('home-sel');
    const awaySel = document.getElementById('away-sel');
    const grid    = document.getElementById('teams-grid');
    teams.forEach(t=>{
      const opt1 = new Option(`${t.code} — ${t.name} (#${t.rank})`, t.code);
      const opt2 = new Option(`${t.code} — ${t.name} (#${t.rank})`, t.code);
      if(t.code==='ARG') opt1.selected=true;
      if(t.code==='BRA') opt2.selected=true;
      homeSel.appendChild(opt1);
      awaySel.appendChild(opt2);
      const chip = document.createElement('div');
      chip.className='team-chip';
      chip.onclick=()=>quickSelect(t.code);
      chip.innerHTML=`<span class="chip-code">${t.code}</span><span class="chip-name">${t.name}</span><span class="chip-rank">#${t.rank} FIFA</span>`;
      grid.appendChild(chip);
    });
  })
  .catch(()=>{
    // Fallback: show message if data not generated yet
    document.getElementById('teams-grid').innerHTML =
      '<p style="color:rgba(255,255,255,.4);font-size:.8rem;grid-column:1/-1;text-align:center">資料尚未生成，請先執行 GitHub Actions workflow</p>';
  });

document.getElementById('predict-form').addEventListener('submit', function(e){
  e.preventDefault();
  const home  = document.getElementById('home-sel').value;
  const away  = document.getElementById('away-sel').value;
  const date  = document.getElementById('inp-date').value;
  const stage = document.getElementById('inp-stage').value;
  const venue = document.getElementById('inp-venue').value;
  if(!home || !away || home===away){ alert('請選擇兩支不同球隊'); return; }
  const btn = document.getElementById('predict-btn');
  btn.textContent='⏳ 載入中...'; btn.disabled=true;
  window.location.href = `report.html?home=${home}&away=${away}&date=${encodeURIComponent(date)}&stage=${encodeURIComponent(stage)}&venue=${encodeURIComponent(venue)}`;
});
</script>
